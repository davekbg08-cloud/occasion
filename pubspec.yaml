name: occasion
description: "Marketplace Flutter Occasion pour acheteurs, vendeurs, produits, paiement et messagerie."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^14.2.0
  get_it: ^7.7.0
  injectable: ^2.4.2
  http: ^1.2.2
  shared_preferences: ^2.3.0
  camera: ^0.10.6
  google_mlkit_text_recognition: ^0.15.1
  permission_handler: ^11.3.1
  fluttertoast: ^8.2.8
  image_picker: ^1.1.2
  cinetpay: ^1.0.8
  cloud_firestore: ^6.5.0
  firebase_core: ^4.10.0
  firebase_storage: ^13.4.2
  firebase_auth: ^6.5.2
  provider: ^6.1.5+1
  video_player: ^2.11.1
  cached_network_image: ^3.4.1
  image: ^4.5.4
  intl: ^0.20.2
  firebase_messaging: ^16.3.0
  flutter_local_notifications: ^22.0.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  fake_cloud_firestore: ^4.1.1
  build_runner: ^2.4.13
  riverpod_generator: ^2.4.3
  injectable_generator: ^2.6.2

flutter:
  uses-material-design: true
  assets:
    - assets/branding/occasion_logo.png
